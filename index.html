<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Which PitStop Pal Are You?</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff9f2;
      color: #003664;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-sizing: border-box;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .blob1, .blob2 {
      position: absolute;
      border-radius: 50%;
      opacity: 0.18;
      z-index: 0;
    }

    .blob1 {
      width: 160px;
      height: 160px;
      background: #1995eb;
      top: -40px;
      right: -40px;
    }

    .blob2 {
      width: 140px;
      height: 140px;
      background: #f47821;
      bottom: -30px;
      left: -30px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      line-height: 1.2;
    }

    h2 {
      font-size: 1.35rem;
      margin-bottom: 16px;
    }

    p {
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      background: #f5c8c8;
      color: #003664;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    .progress {
      margin: 12px 0 20px;
      font-size: 0.95rem;
      font-weight: bold;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .start-btn {
      background: #f47821;
      color: white;
    }

    .option-btn {
      background: #1995eb;
      color: white;
    }

    .restart-btn {
      background: #31af73;
      color: white;
      margin-top: 20px;
    }

    .pal-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: #fff4e8;
    }

    .pal-name {
      font-size: 1.6rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .tip {
      margin-top: 12px;
      font-size: 0.96rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="blob1"></div>
      <div class="blob2"></div>

      <div class="content">
        <div id="app"></div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        q: "After a stressful day, what helps you most?",
        a: [
          { text: "Make a small plan for tomorrow", pal: "perry" },
          { text: "Talk to someone I trust", pal: "iggy" }
        ]
      },
      {
        q: "When exams are coming, you usually...",
        a: [
          { text: "Remind yourself why your goals matter", pal: "ping" },
          { text: "Take breaks to recharge", pal: "tobi" }
        ]
      },
      {
        q: "Your ideal reset activity is...",
        a: [
          { text: "Going for a walk or exercise", pal: "ola" },
          { text: "Taking a good nap or sleeping early", pal: "sky" }
        ]
      },
      {
        q: "When you feel low energy, you...",
        a: [
          { text: "Grab a proper meal or snack", pal: "ty" },
          { text: "Write down what you need to do next", pal: "perry" }
        ]
      }
    ];

    const palResults = {
      perry: {
        name: "Perry — Personal Skills",
        desc: "You stay grounded by organising the chaos. Small steps help you feel steadier.",
        tip: "Try writing down your top 3 priorities for tomorrow."
      },
      ping: {
        name: "Ping — Purpose",
        desc: "You keep going by reconnecting to meaning and the bigger picture.",
        tip: "Ask yourself: what matters most to me this week?"
      },
      ola: {
        name: "Ola — On The Move",
        desc: "Movement helps you reset. You feel better when your body gets to breathe.",
        tip: "Take a 10-minute walk between study blocks."
      },
      ty: {
        name: "Ty — Thoughtful Eating",
        desc: "You care for yourself through nourishment, energy, and gentle routines.",
        tip: "Keep water and a simple snack nearby during long days."
      },
      sky: {
        name: "Sky — Sleep",
        desc: "You know that rest is part of thriving, not a reward you have to earn.",
        tip: "Try sleeping 20–30 minutes earlier tonight."
      },
      tobi: {
        name: "Tobi — Timeout",
        desc: "Pausing with intention helps you return to things with a clearer mind.",
        tip: "Take a real 5-minute no-phone break today."
      },
      iggy: {
        name: "Iggy — Interaction",
        desc: "You find strength through connection, support, and being around people who care.",
        tip: "Check in with one friend today."
      }
    };

    let currentQuestion = -1;
    let scores = {
      perry: 0,
      ping: 0,
      ola: 0,
      ty: 0,
      sky: 0,
      tobi: 0,
      iggy: 0
    };

    const app = document.getElementById("app");

    function showStart() {
      app.innerHTML = `
        <div class="tag">NUS PSS Wellness Quiz</div>
        <h1>Which PitStop Pal Are You?</h1>
        <p>Answer a few quick questions and discover your natural wellness style.</p>
        <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
      `;
    }

    function startQuiz() {
      currentQuestion = 0;
      showQuestion();
    }

    function showQuestion() {
      if (currentQuestion >= questions.length) {
        showResult();
        return;
      }

      const item = questions[currentQuestion];
      app.innerHTML = `
        <div class="tag">Campus Cruise</div>
        <div class="progress">Question ${currentQuestion + 1} of ${questions.length}</div>
        <h2>${item.q}</h2>
        ${item.a.map(opt => `
          <button class="option-btn" onclick="chooseAnswer('${opt.pal}')">${opt.text}</button>
        `).join("")}
      `;
    }

    function chooseAnswer(pal) {
      scores[pal]++;
      currentQuestion++;
      showQuestion();
    }

    function showResult() {
      const topPal = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
      const result = palResults[topPal];

      app.innerHTML = `
        <div class="tag">Your result</div>
        <h1>You got:</h1>
        <div class="pal-box">
          <div class="pal-name">${result.name}</div>
          <p>${result.desc}</p>
          <p class="tip"><b>Try this:</b> ${result.tip}</p>
        </div>
        <button class="restart-btn" onclick="resetQuiz()">Try Again</button>
      `;
    }

    function resetQuiz() {
      currentQuestion = -1;
      scores = {
        perry: 0,
        ping: 0,
        ola: 0,
        ty: 0,
        sky: 0,
        tobi: 0,
        iggy: 0
      };
      showStart();
    }

    showStart();
  </script>
</body>
</html>
